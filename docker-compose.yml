services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stt_db}
      POSTGRES_USER: ${POSTGRES_USER:-stt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stt_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-stt_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-stt_db}
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
    volumes:
      - uploads:/app/uploads
      - whisper_models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: sh -c "cd /app && PYTHONPATH=/app celery -A app.worker.celery_app worker --loglevel=info --concurrency=1"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-stt_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-stt_db}
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - uploads:/app/uploads
      - whisper_models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "8686:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  uploads:
  whisper_models:
